_schema-version: 3.3.0
ID: myCappApp
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: myCappApp-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: '${default-url}'
    requires:
      - name: myCappApp-auth
      - name: myCappApp-db
  ### UI Module APp router module start     
  - name: myCappApp-ui
    type: approuter.nodejs
    path: app/
    parameters:
      # keep-existing-routes: true
      # disk-quota: 256M
      # memory: 256M
      instances: 1
      buildpack: nodejs_buildpack
      build-parameters:
        builder: npm-ci
      properties:
      TENANT_HOST_PATTERN: "^(.*)-${default-uri}"
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: myCappApp-auth
      # - name: srv-api
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          strictSSL: true
          forwardAuthToken: true
          url: '~{srv-url}'
      - name: mtx-api
        group: destinations
        properties:
          name: mtx-api # must be used in xs-app.json as well
          url: ~{mtx-url} 
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}
        ### UI Module APp router module end             
        # - name: myCappApp-auth

        # provides:
        #   - name: app-api
        # properties:
        #   app-protocol: ${protocol}
        #   app-uri: ${default-uri}



  - name: myCappApp-mtx
    type: nodejs
    path: gen/mtx/sidecar
    requires:
      - name: myCappApp-auth
      - name: myCappApp-db
      - name: myCappApp-registry
      - name: app-api
        properties:
          SUBSCRIPTION_URL: ~{app-protocol}://\${tenant_subdomain}-~{app-uri}
    build-parameters:
      builder: npm-ci
    parameters:
      instances: 1
      memory: 256M
      disk-quota: 512M
    hooks:
      - name: upgrade-all
        type: task
        phases:
          - blue-green.application.before-start.idle
          - deploy.application.before-start
        parameters:
          name: upgrade
          memory: 512M # increase as required
          disk-quota: 768M # increase as required
          command: cds-mtx upgrade '*'
    provides:
      - name: mtx-api
        properties:
          mtx-url: ${default-url}
resources:
  - name: myCappApp-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: 'myCappApp-${org}-${space}'
        tenant-mode: shared
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
          # redirect-uris:
          #   - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'Viewer (myCappApp ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Viewer'
          - name: 'Editor (myCappApp ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Editor'
          - name: 'userattributes (myCappApp ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.userattributes'
    requires:
      - name: app-api
    # requires:
    #   - name: app-api
  - name: myCappApp-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: service-manager
      service-plan: container
  - name: myCappApp-registry
    type: org.cloudfoundry.managed-service
    requires:
      - name: mtx-api
    parameters:
      service: saas-registry
      service-plan: application
      config:
        xsappname: myCappApp-${org}-${space}
        appName: myCappApp-${org}-${space}
        displayName: myCappApp
        description: A simple CAP project.
        category: 'Category'
        appUrls:
          getDependencies: ~{mtx-api/mtx-url}/-/cds/saas-provisioning/dependencies
          onSubscription: ~{mtx-api/mtx-url}/-/cds/saas-provisioning/tenant/{tenantId}
          onSubscriptionAsync: true
          onUnSubscriptionAsync: true
          onUpdateDependenciesAsync: true
          callbackTimeoutMillis: 300000 # Increase if your deployments are taking longer than that
