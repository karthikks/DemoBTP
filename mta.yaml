_schema-version: 3.3.0
ID: myCappApp
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: myCappApp-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: '${default-url}'  
    requires:
      - name: myCappApp-auth
      - name: myCappApp-db
  


  - name: myCappApp-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: myCappApp-db
 ### UI Module APp router module start     
  - name: myCappApp-ui
    type: approuter.nodejs
    path: app/
    parameters:
      # keep-existing-routes: true
      # disk-quota: 256M
      # memory: 256M
      instances: 1
      buildpack: nodejs_buildpack
      build-parameters:
        builder: npm-ci
    requires:
      - name: myCappApp-auth
    # - name: srv-api
      - name: srv-api 
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          strictSSL: true
          forwardAuthToken: true
          url: '~{srv-url}'
  ### UI Module APp router module end             
      # - name: myCappApp-auth
   
    # provides:
    #   - name: app-api
        # properties:
        #   app-protocol: ${protocol}
        #   app-uri: ${default-uri}

resources:
  - name: myCappApp-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: 'myCappApp-${org}-${space}'
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          # redirect-uris:
          #   - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'Viewer (myCappApp ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Viewer'
          - name: 'Editor (myCappApp ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Editor'
          - name: 'userattributes (myCappApp ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.userattributes'
    # requires:
    #   - name: app-api
  - name: myCappApp-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
